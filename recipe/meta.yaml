{% set name = "django-jsoneditor" %}
{% set version = "0.0.12" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/django-jsoneditor-{{ version }}.tar.gz
  sha256: 5f38e808cf6148fb38309551e8c76a19c6bff2403aff8456e798fd4944a97127

build:
  noarch: python
  number: 1
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - pip
  run:
    - python >={{ python_min }}
    - packaging
    - django

test:
  requires:
    - python {{ python_min }}
  imports:
    - jsoneditor
    - jsoneditor.fields

about:
  home: https://github.com/nnseva/django-jsoneditor
  summary: Django JSON Editor
  dev_url: https://github.com/nnseva/django-jsoneditor
  license: LGPL-3.0
  license_file: LICENSE
  license_family: LGPL

extra:
  recipe-maintainers:
    - kwilcox
